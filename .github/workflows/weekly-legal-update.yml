name: Weekly Legal Database Update

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      max_docs:
        description: 'Max documents par source'
        required: false
        default: '200'
      sources:
        description: 'Sources (CSV, vide = toutes)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  update-legal-db:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pdfplumber

      - name: Download current ChromaDB index
        run: |
          mkdir -p output
          gh release download v1.0-chroma --pattern "chroma_db.tar.gz" --dir /tmp --repo ${{ github.repository }} || echo "No existing release"
          if [ -f /tmp/chroma_db.tar.gz ]; then
            tar -xzf /tmp/chroma_db.tar.gz -C output/
            [ -d output/chroma_db_new ] && [ ! -d output/chroma_db ] && mv output/chroma_db_new output/chroma_db
            echo "ChromaDB loaded"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run incremental update
        id: update
        run: |
          MAX_DOCS="${{ github.event.inputs.max_docs || '200' }}"
          SOURCES="${{ github.event.inputs.sources || '' }}"
          if [ -n "$SOURCES" ]; then
            python cron_update.py --max-docs "$MAX_DOCS" --sources "$SOURCES" 2>&1 | tee /tmp/update.log
          else
            python cron_update.py --max-docs "$MAX_DOCS" 2>&1 | tee /tmp/update.log
          fi
          NEW_DOCS=$(grep -oP '(\d+) nouveaux documents' /tmp/update.log | grep -oP '\d+' || echo "0")
          echo "new_docs=$NEW_DOCS" >> $GITHUB_OUTPUT

      - name: Package ChromaDB
        if: steps.update.outputs.new_docs != '0'
        run: |
          cd output && tar -czf /tmp/chroma_db.tar.gz chroma_db/

      - name: Upload to GitHub Release
        if: steps.update.outputs.new_docs != '0'
        run: |
          gh release upload v1.0-chroma /tmp/chroma_db.tar.gz --clobber --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Job summary
        run: |
          echo "## Weekly Legal Update" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **New documents**: ${{ steps.update.outputs.new_docs }}" >> $GITHUB_STEP_SUMMARY
          tail -10 /tmp/update.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
