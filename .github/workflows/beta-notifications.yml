name: "Lexavo — Notifications fin de beta"

# 100% automatique — tourne chaque jour a 8h UTC
on:
  schedule:
    - cron: '0 8 * * *'   # Chaque jour a 8h UTC (10h Bruxelles)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Simulation sans envoi (true/false)'
        type: boolean
        default: false
      force_milestone:
        description: 'Forcer un milestone (j30, j15, j7, j0) — laisser vide pour auto'
        type: string
        default: ''

jobs:
  send-beta-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dependances
        run: pip install psycopg2-binary requests

      - name: Envoi des notifications
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          LEXAVO_BETA_END: '2026-10-01'
          RESEND_FROM_EMAIL: 'Lexavo <onboarding@resend.dev>'
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.force_milestone }}" ]; then
            ARGS="$ARGS --force-milestone ${{ inputs.force_milestone }}"
          fi
          python scripts/send_beta_emails.py $ARGS

      - name: Resume du job
        if: always()
        run: |
          echo "### Lexavo Beta Notifications" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date** : $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Beta end** : 2026-10-01" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry run** : ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Force milestone** : ${{ inputs.force_milestone || 'auto' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Consultez les logs ci-dessus pour le rapport detaille." >> $GITHUB_STEP_SUMMARY
