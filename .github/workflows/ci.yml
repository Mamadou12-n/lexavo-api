name: CI — Lexavo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install pytest-cov
      - run: pytest tests/ -v --tb=short --cov=api --cov=rag --cov-report=term-missing --cov-report=xml --cov-fail-under=40
        env:
          DATABASE_URL: sqlite:///./test.db
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LEXAVO_JWT_SECRET: test-secret-for-ci
          ENVIRONMENT: test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-backend
          path: coverage.xml
          retention-days: 30

  mobile:
    name: Mobile (Node 20 / Jest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
        working-directory: mobile
      - run: npx jest --ci --passWithNoTests --coverage --coverageReporters=text --coverageReporters=lcov
        working-directory: mobile
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-mobile
          path: mobile/coverage/
          retention-days: 30
