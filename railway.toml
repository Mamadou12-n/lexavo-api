# =============================================================================
# railway.toml — Lexavo Backend Deployment
# Dockerfile builder (ONNX Runtime, no PyTorch — under 4GB limit)
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[volumes]]
mountPath = "/app/db"
