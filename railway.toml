# =============================================================================
# railway.toml — Lexavo Backend Deployment
# Nixpacks builder (lighter than Dockerfile for Railway free tier)
# =============================================================================

[build]
builder = "NIXPACKS"

[build.nixpacks]
# Install system packages needed at runtime
aptPkgs = ["libpq5", "wget"]

[deploy]
startCommand = "bash start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[volumes]]
mountPath = "/app/db"
