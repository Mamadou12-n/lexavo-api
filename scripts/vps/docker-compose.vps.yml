# docker-compose.vps.yml — Qdrant + Traefik sur VPS Hostinger
# Usage : docker compose -f docker-compose.vps.yml up -d
#
# Prérequis :
#   - DNS A record : qdrant.lexavo.be → 46.202.168.185
#   - Traefik déjà actif sur le VPS (ports 80/443, providers.docker=true)
#   - Variable QDRANT_API_KEY définie dans l'environnement

services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: lexavo-qdrant
    ports:
      # HTTP direct exposé : Railway s'y connecte via http://46.202.168.185:6333
      # Quand DNS qdrant.lexavo.be sera achete, Traefik HTTPS ci-dessous prendra le relais
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
      - QDRANT__SERVICE__ENABLE_TLS=false
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - qdrant-net
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qdrant.rule=Host(`qdrant.lexavo.be`)"
      - "traefik.http.routers.qdrant.entrypoints=websecure"
      - "traefik.http.routers.qdrant.tls.certresolver=letsencrypt"
      - "traefik.http.services.qdrant.loadbalancer.server.port=6333"

networks:
  qdrant-net:
    driver: bridge

volumes:
  qdrant_data:
    external: true
    name: lexavo_qdrant_data
