<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Lexavo — Droit Belge{% endblock %}</title>
    <meta name="description" content="{% block description %}Information juridique belge fiable — Lexavo.{% endblock %}">
    <link rel="canonical" href="{% block canonical %}https://lexavo.be{% endblock %}">
    <!-- Open Graph -->
    <meta property="og:title" content="{% block og_title %}Lexavo — Droit Belge{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Information juridique belge fiable.{% endblock %}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Lexavo">
    <meta property="og:locale" content="fr_BE">
    <style>
        :root { --orange: #E85D26; --navy: #1C2B3A; }
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; color: #1C2B3A; margin: 0; line-height: 1.6; }
        .header { background: #1C2B3A; padding: 1rem 2rem; }
        .header a { color: #E85D26; font-size: 1.5rem; font-weight: 700; text-decoration: none; }
        .nav-links { display: inline-block; margin-left: 2rem; }
        .nav-links a { color: #ccc; text-decoration: none; margin-right: 1.25rem; font-size: .9rem; }
        .nav-links a:hover { color: #E85D26; }
        .container { max-width: 960px; margin: 0 auto; padding: 2rem; }
        h1 { color: #1C2B3A; font-size: 2rem; margin-top: 0; }
        h2 { color: #1C2B3A; font-size: 1.4rem; border-bottom: 2px solid #E85D26; padding-bottom: .4rem; margin-top: 2rem; }
        h3 { color: #1C2B3A; font-size: 1.1rem; }
        .cta { background: #E85D26; color: white; padding: .75rem 1.5rem; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; text-decoration: none; display: inline-block; }
        .cta:hover { background: #c74e1e; }
        .legal-ref { background: #f5f5f5; border-left: 4px solid #E85D26; padding: 1rem; margin: 1rem 0; border-radius: 0 6px 6px 0; }
        .disclaimer { color: #666; font-size: .85rem; border-top: 1px solid #eee; margin-top: 2rem; padding-top: 1rem; }
        .faq-item { border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 1rem; overflow: hidden; }
        .faq-question { background: #f9f9f9; padding: 1rem; font-weight: 600; cursor: pointer; }
        .faq-answer { padding: 1rem; display: none; }
        .faq-item.open .faq-answer { display: block; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        th { background: #1C2B3A; color: white; padding: .75rem 1rem; text-align: left; }
        td { padding: .65rem 1rem; border-bottom: 1px solid #eee; }
        tr:nth-child(even) td { background: #f9f9f9; }
        .badge { display: inline-block; background: #E85D26; color: white; padding: .2rem .6rem; border-radius: 4px; font-size: .8rem; margin-left: .5rem; }
        .badge-blue { background: #1C2B3A; }
        .stars { color: #E85D26; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: .4rem; }
        .form-group input, .form-group select { width: 100%; padding: .6rem .9rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #E85D26; }
        .result-box { background: #1C2B3A; color: white; padding: 1.5rem; border-radius: 8px; margin-top: 1.5rem; display: none; }
        .result-box.visible { display: block; }
        .result-box .amount { font-size: 2rem; font-weight: 700; color: #E85D26; }
        .step { display: flex; gap: 1rem; margin-bottom: 1.5rem; align-items: flex-start; }
        .step-num { background: #E85D26; color: white; width: 2rem; height: 2rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
        footer { background: #1C2B3A; color: #ccc; text-align: center; padding: 2rem; margin-top: 3rem; }
        footer a { color: #E85D26; text-decoration: none; }
        @media (max-width: 600px) { h1 { font-size: 1.5rem; } .container { padding: 1rem; } }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="header">
        <a href="/">Lexavo</a>
        <span class="nav-links">
            <a href="/calcul/preavis-licenciement">Préavis</a>
            <a href="/calcul/pension-alimentaire">Pension</a>
            <a href="/calcul/droits-succession">Succession</a>
            <a href="/avocats/Bruxelles">Avocats</a>
            <a href="/docs">API</a>
        </span>
    </div>
    <div class="container">{% block content %}{% endblock %}</div>
    <footer>
        <p>Lexavo — Information juridique belge. Ne remplace pas un avis d'avocat professionnel.</p>
        <p>© 2026 Lexavo SRL | <a href="/docs">API</a> | <a href="/sitemap.xml">Sitemap</a></p>
    </footer>
    <script>
        document.querySelectorAll('.faq-question').forEach(function(q) {
            q.addEventListener('click', function() {
                this.parentElement.classList.toggle('open');
            });
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
