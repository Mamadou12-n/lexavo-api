# ==============================================================================
# SECTION 9 — CRITICAL (max 5 règles)
# ==============================================================================
critical:
  rules:
    - rule: 1
      text: >
        TOUJOURS citer fichier:ligne pour chaque finding. Jamais de finding vague
        sans localisation exacte. Si impossible à localiser, marquer INCONNU et
        expliquer pourquoi.

    - rule: 2
      text: >
        JAMAIS afficher une clé API, token JWT, ou secret Stripe en clair dans
        le rapport. Remplacer par [REDACTED] et signaler la présence du secret
        dans la section findings sécurité.

    - rule: 3
      text: >
        TOUJOURS spawner les sous-agents d'audit en PARALLÈLE pour les 14 angles
        indépendants. Ne pas les exécuter séquentiellement. Sérialiser uniquement
        si l'output d'un angle nourrit un autre (ex : architecture → refactoring).

    - rule: 4
      text: >
        TOUJOURS comparer chaque score avec l'audit 2026-05-02 (score 6.6/10)
        pour mesurer la progression. Tout score sans delta est incomplet.

    - rule: 5
      text: >
        JAMAIS terminer l'audit sans produire : (a) le tableau de scoring global
        /100 par angle, (b) le top 10 findings classés par sévérité CVSS, et
        (c) la roadmap 30 jours avec effort chiffré + skill assignée par action.

# ==============================================================================
# EXÉCUTION — ORDRE DES PHASES
# ==============================================================================
execution_plan:
  phase_1:
    name: "Initialisation — lecture des fichiers critiques"
    duration_estimate: "5 min"
    actions:
      - "Lire en parallèle : api/main.py, api/security.py, api/auth.py, rag/retriever.py, mobile/App.js, requirements.txt, package.json"
      - "Charger l'état de l'audit 2026-05-02 depuis CLAUDE.md (scores, findings, delta)"
      - "Spawner TodoWrite avec les 14 angles d'audit comme tâches"

  phase_2:
    name: "Audit parallèle — 14 angles"
    duration_estimate: "30-60 min"
    actions:
      - "Spawner 14 sous-agents en parallèle (un par angle)"
      - "Chaque sous-agent invoque la skill primaire de son angle"
      - "Chaque sous-agent retourne : score /10, findings CRITICAL/HIGH/MEDIUM/LOW, effort total"

  phase_3:
    name: "Synthèse — rapport consolidé"
    duration_estimate: "10 min"
    actions:
      - "Agréger les 14 scores → score global pondéré /100"
      - "Consolider le top 10 findings par sévérité CVSS"
      - "Générer la roadmap 30 jours (semaines 1-4)"
      - "Comparer avec audit 2026-05-02 — delta progression"

  phase_4:
    name: "Livraison — rapport final Markdown"
    duration_estimate: "5 min"
    actions:
      - "Produire le rapport final ≤15000 mots"
      - "Tableau de scoring par angle avec delta"
      - "Top 10 findings avec fichier:ligne + CVSS + effort + skill"
      - "Roadmap 30 jours structurée"
      - "Commit du rapport dans le repo : docs/audit-2026-05-05.md"

