# ==============================================================================
# SECTION 8 — EXEMPLES D'EXÉCUTION
# ==============================================================================
examples:

  - id: "exemple_finding_critique"
    description: "Format attendu pour un finding CRITICAL"
    example: |
      <example>
      <input>
      Audit de api/features/lms.py — endpoint /student/lms/connect
      </input>
      <output>
      ## CRITICAL — SSRF sur /student/lms/connect

      **Fichier** : api/features/lms.py:47
      **Sévérité** : HIGH CVSS 8.2
      **Skill utilisée** : security-auditor

      **Finding** : Le paramètre `site_url` accepte n'importe quelle URL sans validation.
      Un attaquant peut passer `http://169.254.169.254/latest/meta-data/` (AWS metadata)
      ou `http://localhost:5432` (PostgreSQL interne) pour exfiltrer des données cloud.

      **Effort** : 1h
      **Fix** :
      ```python
      ALLOWED_LMS_DOMAINS = {"moodle.org", "canvas.instructure.com", "teams.microsoft.com"}

      def validate_lms_url(url: str) -> str:
          parsed = urlparse(url)
          if parsed.hostname not in ALLOWED_LMS_DOMAINS:
              raise HTTPException(status_code=400, detail="LMS domain not allowed")
          return url
      ```
      </output>
      <commentary>
      Le finding cite fichier:ligne, CVSS score, skill responsable, effort chiffré, et
      fournit le fix exact avec code — pas juste "à corriger". C'est actionnable immédiatement.
      </commentary>
      </example>

  - id: "exemple_scoring_angle"
    description: "Format attendu pour le score d'un angle"
    example: |
      <example>
      <input>
      Résultat de l'audit angle sécurité
      </input>
      <output>
      ## Angle Sécurité — Score : 7.5/10

      | Critère | Status | Sévérité |
