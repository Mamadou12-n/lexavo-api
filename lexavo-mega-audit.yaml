      | OWASP API1 BOLA | ✅ OK | — |
      | OWASP API2 Auth | ⚠️ Password min 6 chars (NIST = 8) | MEDIUM |
      | OWASP API4 Rate limit | ⚠️ Par IP seulement, pas user_id | MEDIUM |
      | OWASP API6 SSRF | ❌ lms.py non whitelisté | HIGH |
      | Secrets .env disque | ❌ Stripe live + Anthropic en clair | CRITICAL |
      | Headers HTTP | ✅ api/security.py complet | — |
      | Stripe webhook | ✅ Signature + idempotence | — |

      **Progression vs 2026-05-02** : 7.0 → 7.5/10 (+0.5 grâce aux fixes Phase H)
      </output>
      <commentary>
      Le scoring par angle inclut la comparaison avec l'audit précédent, un tableau
      lisible, et les statuts ✅/⚠️/❌ uniquement (pas d'emojis décoratifs).
      </commentary>
      </example>

  - id: "exemple_roadmap"
    description: "Format de la roadmap 30 jours en sortie"
    example: |
      <example>
      <input>
      Générer la roadmap post-audit
      </input>
